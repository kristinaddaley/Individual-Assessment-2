<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>InkWave Tees — Cart</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="brand"><div class="logo">IW</div><div><div style="font-weight:700">InkWave Tees</div></div></div>
      <nav class="nav"><a href="../index.html">Home</a><a href="about.html">About</a><a href="login.html">Login</a></nav>
    </div>
  </header>

  <main class="container">
    <h2>Your Cart</h2>
    <div id="cart-area">
      <!-- Inject cart table -->
    </div>

    <div style="margin-top:1rem;display:flex;gap:0.5rem;justify-content:flex-end">
      <button id="clear-cart" class="btn btn--ghost">Clear All</button>
      <a id="checkout-btn" class="btn btn--accent" href="checkout.html">Check Out</a>
    </div>
  </main>

  <footer class="footer"><div class="container">© InkWave Tees</div></footer>

  <script src="script.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', ()=> {
      renderCart();
      updateCartCount();
      document.getElementById('clear-cart').addEventListener('click', () => {
        clearCart();
        renderCart();
        updateCartCount();
      });
    });
  </script>
</body>
</html>
