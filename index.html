<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>InkWave Tees — Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="brand">
        <div class="logo">IW</div>
        <div>
          <div style="font-weight:700">InkWave Tees</div>
          <div class="small">Original graphic t-shirts</div>
        </div>
      </div>
      <nav class="nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="code/about.html">About</a>
        <a href="code/cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="code/login.html">Login</a>

  </header>

  <main class="container">
    <section class="hero" aria-labelledby="hero-title">
      <img src="Assets/ink.JPEG" alt="InkWave T-shirt" />
      <div>
        <h1 id="hero-title">Bold designs. Local artists.</h1>
        <p class="muted">Monthly limited runs — fresh graphic tees for creative minds.</p>
        <a class="btn btn--accent" href="#products">Shop Now</a>
      </div>
    </section>

    <section id="products">
      <h2>Featured Tees</h2>
      <div class="grid" id="product-grid">
        <!-- Product cards injected by script.js -->
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div>© InkWave Tees • All rights reserved</div>
    </div>
  </footer>

  <script src="code/script.js"></script>
  <script>
    // Initialize product list on load
    window.addEventListener('DOMContentLoaded', () => {
      renderProducts();
      updateCartCount();
    });
